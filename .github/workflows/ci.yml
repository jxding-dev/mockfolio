name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'codex/**']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
